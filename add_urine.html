<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>บันทึกปริมาณปัสสาวะ - CKD Nutrition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_client.js"></script>
    <script src="theme.js"></script>
    <script>
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'login.html';
        }
    </script>
    <style>
        .premium-card {
            background: linear-gradient(145deg, #ffffff, #fffbeb);
            border: 1px solid rgba(245, 158, 11, 0.15);
            box-shadow: 0 10px 25px -5px rgba(245, 158, 11, 0.1);
            border-radius: var(--radius-lg);
            text-align: center;
            margin-bottom: 32px;
            padding: 32px 24px;
            position: relative;
            overflow: hidden;
        }
        .premium-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #F59E0B, #FCD34D);
        }
        .icon-wrapper {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FEF3C7 0%, rgba(245, 158, 11, 0.1) 100%);
            color: #F59E0B;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            margin: 0 auto 20px;
            box-shadow: 0 8px 16px rgba(245, 158, 11, 0.15);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .huge-input-wrapper {
            position: relative;
            margin-top: 8px;
        }
        .huge-input {
            width: 100%;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 20px;
            font-size: 32px;
            font-weight: 700;
            color: #F59E0B;
            text-align: center;
            font-family: 'Prompt', sans-serif;
            transition: all 0.3s;
            background: var(--surface-color);
        }
        .huge-input:focus {
            outline: none;
            border-color: #F59E0B;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
        }
        .huge-input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }
        .unit-label {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-medium);
            font-weight: 600;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <a href="index.html" class="icon-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h1 class="header-title">บันทึกปริมาณปัสสาวะ</h1>
            <div style="width: 40px;"></div> <!-- Spacer -->
        </header>

        <!-- Main Content -->
        <main class="app-content" style="padding: 24px 20px;">
            <div class="premium-card">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-flask"></i>
                </div>
                <h2 style="font-size: 22px; font-weight: 700; margin-bottom: 8px; color: var(--text-high);">คุณปัสสาวะออกไปเท่าไหร่?</h2>
                <p style="color: var(--text-medium); font-size: 15px; margin-bottom: 0;" id="date-display">กำลังโหลดวันที่...</p>
            </div>

            <!-- AI Voice Input -->
            <div class="ai-voice-card" style="margin-bottom: 24px; padding: 16px; background: rgba(13, 139, 255, 0.05); border-radius: 12px; border: 1px dashed var(--primary-color);">
                <h3 style="font-size: 15px; font-weight: 700; color: var(--primary-dark); margin-bottom: 8px;"><i class="fa-solid fa-microphone"></i> สั่งงานด้วยเสียงด้วย AI ✨</h3>
                <p style="font-size: 13px; color: var(--text-medium); margin-bottom: 16px; line-height: 1.4;">ลองพูดว่า: <span style="font-style: italic; color: var(--text-dark);">"ฉี่สีเหลืองเข้ม ปริมาณประมาณหนึ่งแก้วน้ำ"</span> แล้วให้ AI ช่วยคำนวณให้</p>
                
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 8px;">
                    <button id="voice-btn" style="width: 72px; height: 72px; border-radius: 50%; background: var(--surface-color); border: 2px solid var(--primary-color); color: var(--primary-color); font-size: 28px; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; justify-content: center; align-items: center;">
                        <i class="fa-solid fa-microphone"></i>
                    </button>
                    <div id="voice-status" style="margin-top: 12px; font-size: 14px; font-weight: 600; color: var(--primary-color);">กดเพื่อพูด</div>
                    <div id="voice-text-display" style="font-size: 14px; font-style: italic; color: var(--text-high); display: none; margin-top: 8px; text-align: center; max-width: 90%;">...</div>
                </div>
            </div>

            <!-- Manual Input -->
            <div class="form-group" style="margin-bottom: 32px;">
                <label class="form-label" for="urine-input" style="font-size: 16px; font-weight: 700;">ระบุปริมาณปัสสาวะ</label>
                <p style="font-size: 13px; color: var(--text-medium); margin-top: -4px; margin-bottom: 12px;">ตวงจากกระบอกตวง หรือกะปริมาณโดยประมาณ</p>
                <div class="huge-input-wrapper">
                    <input type="number" id="urine-input" class="huge-input" placeholder="0">
                    <span class="unit-label">มล.</span>
                </div>
            </div>

            <button class="btn btn-primary btn-block" id="save-btn" style="padding: 16px; font-size: 18px; font-weight: 600; border-radius: var(--radius-md); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2); background-color: #F59E0B; border-color: #F59E0B;">
                <i class="fa-solid fa-check" style="margin-right: 8px;"></i> บันทึกปริมาณปัสสาวะ
            </button>
        </main>
        
        <!-- Toast Notification -->
        <div id="toast" class="toast-notification">
            <i class="fa-solid fa-circle-check"></i>
            <span id="toast-message">บันทึกสำเร็จ</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_client.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dateDisplay = document.getElementById('date-display');
            const urineInput = document.getElementById('urine-input');
            const saveBtn = document.getElementById('save-btn');
            
            // Format Date function
            const thMonths = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
            
            // Get Date from URL
            const urlParams = new URLSearchParams(window.location.search);
            let targetDateStr = urlParams.get('date');
            
            if (!targetDateStr) {
                const now = new Date();
                const yyyy = now.getFullYear();
                const mm = String(now.getMonth() + 1).padStart(2, '0');
                const dd = String(now.getDate()).padStart(2, '0');
                targetDateStr = `${yyyy}-${mm}-${dd}`;
            }
            
            // Display Date
            const d = new Date(targetDateStr);
            dateDisplay.textContent = `สำหรับวันที่ ${d.getDate()} ${thMonths[d.getMonth()]} พ.ศ. ${d.getFullYear() + 543}`;
            
            // Save Logic
            saveBtn.addEventListener('click', async () => {
                const val = parseInt(urineInput.value);
                if (isNaN(val) || val <= 0) {
                    showToast('กรุณาระบุปริมาณปัสสาวะที่ถูกต้อง', 'error');
                    return;
                }
                
                // Get user from local storage
                const userEmail = localStorage.getItem('currentUserEmail');
                if (!userEmail) {
                    showToast('ไม่พบข้อมูลผู้ใช้ กรุณาเข้าสู่ระบบใหม่', 'error');
                    return;
                }
                
                const encodedEmail = userEmail.toLowerCase().replace(/\./g, ',');
                
                try {
                    saveBtn.disabled = true;
                    saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> กำลังบันทึก...';
                    
                    // Fetch existing data to append
                    const { data: currentData, error: fetchError } = await supabase
                        .from('daily_logs')
                        .select('*')
                        .eq('email', userEmail.toLowerCase())
                        .eq('date', targetDateStr)
                        .maybeSingle();
                        
                    const existingData = currentData || {};
                    const currentUrine = existingData.urine_output_ml || 0;
                    
                    const timeStr = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + ' น.';
                    const newMeal = {
                        name: 'ปัสสาวะ',
                        time: timeStr,
                        water: val, // use water for UI consistency in the badge
                        protein: 0, carb: 0, sodium: 0, potassium: 0, sugar: 0
                    };
                    
                    let currentMeals = existingData.meals || [];
                    if (typeof currentMeals === 'string') {
                        try { currentMeals = JSON.parse(currentMeals); } catch(e) { currentMeals = []; }
                    }
                    if (!Array.isArray(currentMeals)) {
                        currentMeals = [];
                    }
                    // Filter out any corrupted elements
                    currentMeals = currentMeals.filter(m => m && typeof m === 'object' && m.name);
                    currentMeals.push(newMeal);
                    
                    const updateData = {
                        email: userEmail.toLowerCase(),
                        date: targetDateStr,
                        urine_output_ml: currentUrine + val,
                        meals: currentMeals
                    };
                    
                    const { error: upsertError } = await supabase
                        .from('daily_logs')
                        .upsert(updateData, { onConflict: 'email, date' });
                        
                    if (upsertError) throw upsertError;
                    
                    showToast('บันทึกปริมาณปัสสาวะสำเร็จ!', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                    
                } catch (err) {
                    console.error("Error saving urine logic:", err);
                    showToast('เกิดข้อผิดพลาดในการบันทึกข้อมูล', 'error');
                    saveBtn.disabled = false;
                    saveBtn.textContent = 'บันทึกปริมาณปัสสาวะ';
                }
            });
            
            function showToast(msg, type='success') {
                const toast = document.getElementById('toast');
                const toastMsg = document.getElementById('toast-message');
                const icon = toast.querySelector('i');
                
                toastMsg.textContent = msg;
                if(type === 'error') {
                    toast.style.backgroundColor = 'var(--error-base)';
                    icon.className = 'fa-solid fa-circle-exclamation';
                } else {
                    toast.style.backgroundColor = 'var(--success-color)';
                    icon.className = 'fa-solid fa-circle-check';
                }
                
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }
            
            // --- AI Voice Estimation Logic ---
            const voiceBtn = document.getElementById('voice-btn');
            const voiceStatus = document.getElementById('voice-status');
            const voiceTextDisplay = document.getElementById('voice-text-display');
            let recognition = null;
            let isListening = false;

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'th-TH'; // Thai
                recognition.continuous = false;
                recognition.interimResults = false;

                recognition.onstart = function() {
                    isListening = true;
                    voiceBtn.style.backgroundColor = 'var(--error-base)';
                    voiceBtn.style.borderColor = 'var(--error-base)';
                    voiceBtn.style.color = 'white';
                    voiceBtn.style.boxShadow = '0 0 15px rgba(239, 68, 68, 0.4)';
                    voiceBtn.innerHTML = '<i class="fa-solid fa-stop"></i>';
                    voiceStatus.textContent = 'กำลังฟังเสียง... (พูดจบแล้วกดหยุด)';
                    voiceTextDisplay.style.display = 'block';
                    voiceTextDisplay.textContent = 'กำลังฟัง...';
                };

                recognition.onresult = async function(event) {
                    const transcript = event.results[0][0].transcript;
                    voiceTextDisplay.textContent = `"${transcript}"`;
                    voiceStatus.textContent = 'กำลังประมวลผลด้วย AI...';
                    
                    await processTextWithGemini(transcript);
                };

                recognition.onerror = function(event) {
                    console.error('Speech recognition error', event.error);
                    showToast('เกิดข้อผิดพลาดในการฟังเสียง: ' + event.error, 'error');
                    resetVoiceUI();
                };

                recognition.onend = function() {
                    if (isListening) resetVoiceUI();
                };

                voiceBtn.addEventListener('click', () => {
                    if (isListening) {
                        recognition.stop();
                    } else {
                        recognition.start();
                    }
                });
            } else {
                voiceBtn.addEventListener('click', () => {
                    showToast('เบราว์เซอร์หรืออุปกรณ์ของคุณไม่รองรับการสั่งงานด้วยเสียง (Speech API)', 'error');
                });
            }

            function resetVoiceUI() {
                isListening = false;
                voiceBtn.style.backgroundColor = 'var(--surface-color)';
                voiceBtn.style.borderColor = 'var(--primary-color)';
                voiceBtn.style.color = 'var(--primary-color)';
                voiceBtn.style.boxShadow = '0 4px 10px rgba(0,0,0,0.05)';
                voiceBtn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                if(voiceStatus.textContent !== 'กำลังประมวลผลด้วย AI...') {
                    voiceStatus.textContent = 'กดเพื่อพูดใหม่';
                }
            }
            
            async function processTextWithGemini(text) {
                let apiKey = localStorage.getItem('gemini_api_key');
                if (!apiKey) {
                    showToast('กรุณาตั้งค่า API Key ก่อนใช้งาน (ตั้งที่หน้า เพิ่มเมนู > กำหนดเอง)', 'error');
                    voiceStatus.textContent = 'เกิดข้อผิดพลาด';
                    return;
                }
                
                try {
                    voiceBtn.disabled = true;
                    
                    const promptText = `Extract urine volume from this Thai text: "${text}". 
Return ONLY a valid JSON object with the key "volume_ml" (integer in milliliters).
If the text mentions "แก้ว" (glass), assume 250. If "ขวด" (bottle), assume 500. If "ลิตร" (liter), convert to ml. If "ซีซี" (cc), it is ml.
If no volume is mentioned or it's nonsense, return {"error": "not found"}. Do not return markdown.`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-lite-latest:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: promptText }] }],
                            generationConfig: { maxOutputTokens: 100 }
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.error) {
                        throw new Error(data.error.message || 'API Error');
                    }
                    
                    let resultText = data.candidates[0].content.parts[0].text;
                    resultText = resultText.replace(/```json/gi, '').replace(/```/g, '').trim();
                    
                    const result = JSON.parse(resultText);
                    
                    if (result.error) {
                        throw new Error("AI ไม่พบปริมาตรในประโยคที่คุณพูด กรุณาลองพูดให้ชัดเจนขึ้น");
                    }
                    
                    if (result.volume_ml) {
                        urineInput.value = result.volume_ml;
                        showToast(`AI ประเมินได้: ${result.volume_ml} มล.`, 'success');
                        voiceStatus.textContent = 'วิเคราะห์เสร็จสิ้น ✨';
                        
                        urineInput.style.transition = 'background-color 0.5s';
                        urineInput.style.backgroundColor = 'rgba(16, 185, 129, 0.15)';
                        setTimeout(() => {
                            urineInput.style.backgroundColor = 'transparent';
                        }, 1500);
                    }
                    
                } catch (err) {
                    console.error("AI Error:", err);
                    showToast(err.message || 'ไม่สามารถวิเคราะห์ข้อมูลได้', 'error');
                    voiceStatus.textContent = 'กดเพื่อพูดใหม่';
                } finally {
                    voiceBtn.disabled = false;
                }
            }
        });
    </script>
</body>
</html>
