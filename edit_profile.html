<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลส่วนตัว - CKD Nutrition</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_client.js"></script>
    <script src="theme.js"></script>
    <style>
        .form-section {
            background-color: var(--surface-color);
            border-radius: var(--radius-lg);
            padding: 20px 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0,0,0,0.02);
            animation: slideUp 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        .form-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--primary-color), var(--secondary-color));
            opacity: 0.8;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-high);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 16px;
        }

        .section-title i {
            background: rgba(13, 139, 255, 0.1);
            padding: 10px;
            border-radius: 12px;
            font-size: 16px;
        }

        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group.half {
            flex: 1;
            margin-bottom: 0;
        }

        .input-suffix {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-low);
            font-size: 15px;
            pointer-events: none;
            font-weight: 500;
        }

        .input-group {
            position: relative;
        }
        
        .form-input {
            background-color: var(--bg-base);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            font-size: 16px;
            width: 100%;
            transition: all 0.3s ease;
            color: var(--text-high);
            font-family: 'Prompt', sans-serif;
            box-sizing: border-box;
        }

        .form-input:focus {
            background-color: var(--surface-color);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(13, 139, 255, 0.15);
            outline: none;
        }

        .form-input::placeholder {
            color: var(--text-low);
            font-weight: 300;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-medium);
        }

        /* Remove default arrows from number inputs */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* Segmented Control for Gender */
        .segmented-control {
            display: flex;
            background-color: var(--bg-base);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 4px;
            gap: 4px;
            height: 52px; /* Match form-input height */
        }
        .segmented-control input[type="radio"] {
            display: none;
        }
        .segmented-control .segment {
            flex: 1;
            text-align: center;
            border-radius: 8px;
            color: var(--text-medium);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .segmented-control input[type="radio"]:checked + .segment {
            background-color: var(--primary-color);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(13, 139, 255, 0.2);
        }
        .custom-select-btn {
            background-color: var(--bg-base);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            font-size: 16px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-high);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .custom-select-btn:active {
            transform: scale(0.98);
        }

        .custom-select-btn.unselected {
            color: var(--text-low);
        }

        .bottom-sheet-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-end;
        }

        .bottom-sheet-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .bottom-sheet-content {
            background: var(--surface-color);
            width: 100%;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            transform: translateY(100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 80vh;
            overflow-y: auto;
        }

        .bottom-sheet-overlay.active .bottom-sheet-content {
            transform: translateY(0);
        }

        .sheet-drag-handle {
            width: 40px;
            height: 5px;
            background: var(--border-color);
            border-radius: 3px;
            margin: 0 auto 20px auto;
        }

        .sheet-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            text-align: center;
        }

        .stage-list-item {
            padding: 16px;
            border-radius: 16px;
            border: 1px solid #f1f5f9;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .stage-list-item:active {
            background-color: var(--bg-base);
            transform: scale(0.98);
        }

        .stage-list-item.selected {
            border-color: var(--primary-color);
            background-color: #F0F9FF;
        }

        .stage-list-name {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-high);
        }

        .stage-list-desc {
            color: var(--text-medium);
            font-size: 14px;
        }
        
        .btn-save {
            width: 100%;
            margin-top: 16px;
            margin-bottom: 32px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            box-shadow: 0 8px 20px rgba(13, 139, 255, 0.3);
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(13, 139, 255, 0.4);
        }

        /* Override body background to be light gray for contrast with white cards */
        body {
            background-color: var(--bg-base);
        }
    </style>
</head>
<body>
    <div class="app-container" style="padding-bottom: 24px;">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <a href="profile.html" style="color: var(--text-high); text-decoration: none;">
                    <i class="fa-solid fa-arrow-left" style="font-size: 20px;"></i>
                </a>
            </div>
            <div class="header-title">ข้อมูลส่วนตัวของคุณ</div>
            <div class="header-right"></div>
        </header>

        <form id="profile-form">
            <div class="form-section">
                <div class="section-title">
                    <i class="fa-solid fa-user" style="color: var(--primary-color);"></i>
                    ข้อมูลพื้นฐาน
                </div>
                
                <div class="form-group" style="margin-bottom: 16px;">
                    <label class="form-label" for="user-name">ชื่อ - นามสกุล</label>
                    <input type="text" class="form-input" id="user-name" placeholder="ชื่อที่ใช้เรียก" required>
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label class="form-label" for="user-age">อายุ</label>
                        <div class="input-group">
                            <input type="number" class="form-input" id="user-age" placeholder="อายุ" required min="1" max="120">
                            <span class="input-suffix">ปี</span>
                        </div>
                    </div>
                    <div class="form-group half">
                        <label class="form-label">เพศ</label>
                        <div class="segmented-control">
                            <input type="radio" id="gender-male" name="user-gender" value="male" checked>
                            <label class="segment" for="gender-male"><i class="fa-solid fa-mars"></i> ชาย</label>
                            
                            <input type="radio" id="gender-female" name="user-gender" value="female">
                            <label class="segment" for="gender-female"><i class="fa-solid fa-venus"></i> หญิง</label>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label class="form-label" for="user-weight">น้ำหนัก</label>
                        <div class="input-group">
                            <input type="number" step="0.1" class="form-input" id="user-weight" placeholder="น้ำหนัก" required min="10" max="300">
                            <span class="input-suffix">กก.</span>
                        </div>
                    </div>
                    <div class="form-group half">
                        <label class="form-label" for="user-height">ส่วนสูง</label>
                        <div class="input-group">
                            <input type="number" step="0.1" class="form-input" id="user-height" placeholder="ส่วนสูง" required min="50" max="300">
                            <span class="input-suffix">ซม.</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">
                    <i class="fa-solid fa-kit-medical" style="color: var(--secondary-color); background: rgba(16, 185, 129, 0.1);"></i>
                    ระยะโรคไตของคุณ
                </div>
                
                <div class="form-group" style="margin-bottom: 0;">
                    <div class="custom-select-btn unselected" id="stage-select-btn">
                        <span id="stage-select-text">-- เลือกระยะโรคไตของคุณ --</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>
                    <input type="hidden" name="ckd_stage" id="ckd_stage" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-save" id="btn-save">
                <i class="fa-solid fa-floppy-disk"></i> บันทึกข้อมูล
            </button>
        </form>
    </div>

    <!-- Bottom Sheet Modal (Stage Select) -->
    <div class="bottom-sheet-overlay" id="stage-sheet">
        <div class="bottom-sheet-content">
            <div class="sheet-drag-handle"></div>
            <h3 class="sheet-title">เลือกระยะโรคไตของคุณ</h3>
            
            <div class="stage-list" id="stage-list">
                <div class="stage-list-item" data-value="1" data-name="ระยะที่ 1 (eGFR &ge; 90)">
                    <div class="stage-list-name">ระยะที่ 1</div>
                    <div class="stage-list-desc">eGFR &ge; 90</div>
                </div>
                <div class="stage-list-item" data-value="2" data-name="ระยะที่ 2 (eGFR 60-89)">
                    <div class="stage-list-name">ระยะที่ 2</div>
                    <div class="stage-list-desc">eGFR 60-89</div>
                </div>
                <div class="stage-list-item" data-value="3a" data-name="ระยะที่ 3a (eGFR 45-59)">
                    <div class="stage-list-name">ระยะที่ 3a</div>
                    <div class="stage-list-desc">eGFR 45-59</div>
                </div>
                <div class="stage-list-item" data-value="3b" data-name="ระยะที่ 3b (eGFR 30-44)">
                    <div class="stage-list-name">ระยะที่ 3b</div>
                    <div class="stage-list-desc">eGFR 30-44</div>
                </div>
                <div class="stage-list-item" data-value="4" data-name="ระยะที่ 4 (eGFR 15-29)">
                    <div class="stage-list-name">ระยะที่ 4</div>
                    <div class="stage-list-desc">eGFR 15-29</div>
                </div>
                <div class="stage-list-item" data-value="5" data-name="ระยะที่ 5 (ก่อนฟอกไต)">
                    <div class="stage-list-name">ระยะที่ 5</div>
                    <div class="stage-list-desc">ก่อนฟอกไต</div>
                </div>
                <div class="stage-list-item" data-value="5_dialysis" data-name="ระยะที่ 5 (ฟอกเลือด)" style="border-color: var(--error-base); background-color: var(--error-light);">
                    <div class="stage-list-name" style="color: #DC2626;">ระยะที่ 5 (ฟอกเลือด)</div>
                    <div class="stage-list-desc" style="color: #EF4444;">สำหรับผู้ป่วยที่ฟอกไตแล้ว</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase_client.js"></script>
    <script>
        function encodeEmail(email) {
            return email.toLowerCase().replace(/\./g, ',');
        }

        // Custom Toast Notification Function
        function showToast(message, type = 'success') {
            let toast = document.getElementById('custom-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'custom-toast';
                document.body.appendChild(toast);
            }
            toast.className = `toast-notification ${type === 'success' ? 'toast-success' : ''}`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation'}"></i> ${message}`;
            
            void toast.offsetWidth; // trigger reflow
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Auth check
        if(localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }



        // Custom Bottom Sheet Logic
        const stageSelectBtn = document.getElementById('stage-select-btn');
        const stageSheet = document.getElementById('stage-sheet');
        const stageInput = document.getElementById('ckd_stage');
        const stageSelectText = document.getElementById('stage-select-text');
        const stageListItems = document.querySelectorAll('.stage-list-item');

        stageSelectBtn.addEventListener('click', () => {
            stageSheet.classList.add('active');
        });

        stageSheet.addEventListener('click', (e) => {
            if (e.target === stageSheet) {
                stageSheet.classList.remove('active');
            }
        });

        stageListItems.forEach(item => {
            item.addEventListener('click', () => {
                // Remove selected from all
                stageListItems.forEach(i => i.classList.remove('selected'));
                // Add to clicked
                item.classList.add('selected');
                
                // Update button and input
                stageInput.value = item.getAttribute('data-value');
                stageSelectText.textContent = item.getAttribute('data-name');
                stageSelectBtn.classList.remove('unselected');
                
                // Close sheet
                stageSheet.classList.remove('active');
            });
        });

        // Load existing data if any
        const currentUserEmail = localStorage.getItem('currentUserEmail');
        const tempRegName = localStorage.getItem('tempRegName');
        
        if (currentUserEmail) {
            // Fetch from Supabase
            (async () => {
                try {
                    const { data: userProfile, error } = await supabase
                        .from('profiles')
                        .select('*')
                        .eq('email', currentUserEmail.toLowerCase())
                        .single();
                        
                    if (userProfile && !error) {
                        document.getElementById('user-name').value = userProfile.name || tempRegName || '';
                        document.getElementById('user-age').value = userProfile.age || '';
                        const genderValue = userProfile.gender || 'male';
                        const genderRadio = document.querySelector(`input[name="user-gender"][value="${genderValue}"]`);
                        if (genderRadio) genderRadio.checked = true;
                        document.getElementById('user-weight').value = userProfile.weight || '';
                        document.getElementById('user-height').value = userProfile.height || '';
                        
                        const stageValue = userProfile.stage || '1';
                        document.getElementById('ckd_stage').value = stageValue;
                        const targetItem = document.querySelector(`.stage-list-item[data-value="${stageValue}"]`);
                        if (targetItem) {
                            stageListItems.forEach(i => i.classList.remove('selected'));
                            targetItem.classList.add('selected');
                            stageSelectText.textContent = targetItem.getAttribute('data-name');
                            stageSelectBtn.classList.remove('unselected');
                        }
                    } else if (tempRegName) {
                        document.getElementById('user-name').value = tempRegName;
                    }
                } catch (err) {
                    console.error('Supabase fetch error:', err);
                    if (tempRegName) document.getElementById('user-name').value = tempRegName;
                }
            })();
        } else if (tempRegName) {
            document.getElementById('user-name').value = tempRegName;
        }

        // Form submission and calculation
        document.getElementById('profile-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> กำลังคำนวณ...';

            const name = document.getElementById('user-name').value;
            const age = parseInt(document.getElementById('user-age').value);
            const gender = document.querySelector('input[name="user-gender"]:checked').value;
            const weight = parseFloat(document.getElementById('user-weight').value);
            const height = parseFloat(document.getElementById('user-height').value);
            const stage = stageInput.value;
            
            if (!stage) {
                showToast('กรุณาเลือกระยะโรคไตของคุณ', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> บันทึกข้อมูล';
                return;
            }

            // --- CKD Rules Calculation ---
            // 1. Protein (g/kg body weight)
            let proteinMultiplier = 1.0;
            if (stage === '1' || stage === '2') proteinMultiplier = 1.0;
            else if (stage === '3a') proteinMultiplier = 0.8;
            else if (stage === '3b') proteinMultiplier = 0.7; // Avg 0.6-0.8
            else if (stage === '4' || stage === '5') proteinMultiplier = 0.6;
            else if (stage === '5_dialysis') proteinMultiplier = 1.25; // Avg 1.2-1.3
            
            const proteinLimit = Math.round(weight * proteinMultiplier);

            // 2. Potassium (mg)
            let potassiumLimit = 3500; // Normal
            if (stage === '3b' || stage === '4' || stage === '5' || stage === '5_dialysis') {
                potassiumLimit = 2000;
            }

            // 3. Water (ml)
            let waterLimit = 1500;
            if (stage === '4' || stage === '5' || stage === '5_dialysis') {
                waterLimit = 1000; // Urine(500) + 500
            }

            // 4. Carb (g) = 4.5 g/kg (Avg 3.75 - 5.25)
            const carbLimit = Math.round(weight * 4.5);

            // Fixed limits
            const sodiumLimit = 2000;
            const sugarLimit = 24;
            const energyLimit = Math.round(weight * 32.5); // 30-35 kcal/kg

            const userProfile = {
                name, age, gender, weight, height, stage: stage,
                limits: {
                    protein: proteinLimit,
                    potassium: potassiumLimit,
                    water: waterLimit,
                    carb: carbLimit,
                    sodium: sodiumLimit,
                    sugar: sugarLimit,
                    energy: energyLimit
                }
            };

            // Save to Supabase
            if (currentUserEmail) {
                (async () => {
                    try {
                        const { error } = await supabase
                            .from('profiles')
                            .update(userProfile)
                            .eq('email', currentUserEmail.toLowerCase());
                            
                        if (error) throw error;
                        
                        setTimeout(() => {
                            localStorage.removeItem('tempRegName');
                            showToast('บันทึกข้อมูลและคำนวณเป้าหมายสำเร็จ!', 'success');
                            setTimeout(() => {
                                window.location.href = 'index.html';
                            }, 1500);
                        }, 800);
                        
                    } catch (err) {
                        console.error('Error saving profile:', err);
                        showToast('เกิดข้อผิดพลาดในการบันทึกข้อมูล', 'error');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> บันทึกข้อมูล';
                    }
                })();
            } else {
                showToast('ไม่พบข้อมูลบัญชี กรุณาเข้าสู่ระบบใหม่', 'error');
                setTimeout(() => { window.location.href = 'login.html'; }, 1500);
            }
        });
    </script>
</body>
</html>
